name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm tsc --noEmit
      - run: pnpm test

      - name: Verify tag matches package.json version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag v$TAG_VERSION does not match package.json version $PKG_VERSION" >&2
            exit 1
          fi

  publish-npm:
    needs: check
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: npm install -g npm@latest
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Debug OIDC token claims
        run: |
          TOKEN=$(curl -sSL -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=npm:registry.npmjs.org" | jq -r '.value')
          node -e "
            const [,body] = process.argv[1].split('.');
            const claims = JSON.parse(Buffer.from(body, 'base64url').toString());
            const keep = ['iss','aud','sub','repository','repository_owner','workflow','workflow_ref','ref','ref_type','event_name','environment','job_workflow_ref','runner_environment'];
            for (const k of keep) console.log(k + ': ' + (claims[k] ?? '(none)'));
          " "$TOKEN"

      - run: npm publish --provenance --access public --loglevel=verbose

  build-electron:
    needs: check
    runs-on: macos-14
    env:
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      CSC_LINK: ${{ secrets.CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build:electron
      - run: pnpm exec electron-builder --mac --publish never

      - uses: actions/upload-artifact@v4
        with:
          name: electron-dmg
          path: release/*.dmg
          if-no-files-found: error
          retention-days: 7

  github-release:
    needs: [publish-npm, build-electron]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: electron-dmg
          path: dmg/

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dmg/*.dmg
          fail_on_unmatched_files: true
