name: Feature request
description: Suggest an idea for purplemux
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: what
    attributes:
      label: What would you like to see?
    validations:
      required: true

  - type: textarea
    id: why
    attributes:
      label: Why is this useful?
      description: What problem does it solve, or what use case does it enable?
    validations:
      required: true
