# purplemux 전용 tmux 설정
# 사용자 ~/.tmux.conf와 완전 격리

# UI 투명성
set -g status off
set -g aggressive-resize on

# prefix key 비활성 (모든 키 입력이 쉘에 전달)
set -g prefix None
unbind-key -a

# 스크롤백 버퍼 (xterm.js scrollback과 동일)
set -g history-limit 5000

# 터미널 설정
set -g default-terminal "xterm-256color"
# source-file 재호출 시 누적되지 않도록 기본값으로 되돌린 뒤 append
set -gu terminal-overrides
set -ga terminal-overrides ",xterm-256color:Tc"
# OSC 8 하이퍼링크 통과 (Ink <Link>, ls --hyperlink, gh 등)
set -gu terminal-features
set -as terminal-features ",xterm-256color:hyperlinks"

# 마우스 스크롤 지원 (copy-mode 진입 후 스크롤백 탐색)
set -g mouse on

# OSC 52로 선택 영역을 브라우저 클립보드에 전달 (xterm.js ClipboardAddon이 수신)
set -s set-clipboard on

# unbind-key -a로 삭제된 마우스 기본 바인딩을 재정의
# 포그라운드 앱이 mouse reporting을 켰으면 send -M으로 위임하고,
# 그렇지 않으면 tmux가 copy-mode로 처리한다.
bind -T root MouseDrag1Pane \
  if-shell -Ft= "#{mouse_any_flag}" \
    "send-keys -M" \
    "if-shell -Ft= '#{pane_in_mode}' 'send-keys -M' 'copy-mode -eM'"
bind -T root WheelUpPane \
  if-shell -Ft= "#{?pane_in_mode,1,#{mouse_any_flag}}" \
    "send-keys -M" \
    "copy-mode -e"
bind -T root WheelDownPane send-keys -M

# copy-mode 내부: 드래그 끝 → OSC 52 방출(외부 명령 없음) 후 copy-mode 종료
bind -T copy-mode MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel
bind -T copy-mode MouseDown1Pane    send-keys -X cancel
bind -T copy-mode WheelUpPane       send-keys -X -N 3 scroll-up
bind -T copy-mode WheelDownPane     send-keys -X -N 3 scroll-down

# 새 클라이언트 attach 시 SSH agent 등 환경변수 갱신 (브라우저 새 탭에서 재접속 시 stale 방지)
set -g update-environment "SSH_AUTH_SOCK SSH_CONNECTION SSH_TTY DISPLAY WAYLAND_DISPLAY"

# 외부 터미널의 포커스 이벤트를 내부 앱(Neovim 등)으로 전달
set -g focus-events on

# 터미널 타이틀을 외부 터미널로 전달 (탭에 디렉토리/프로세스 표시)
# tmux가 foreground process와 CWD를 직접 추적하므로 모든 쉘에서 동작
set -g set-titles on
set -g set-titles-string "#{pane_current_command}|#{pane_current_path}"
set -g status-interval 2
set -g allow-passthrough on

# 세션 종료 시 자동 정리
set -g destroy-unattached off
set -g exit-unattached off
